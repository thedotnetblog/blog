baseURL = "https://thedotnetblog.com"
languageCode = "en-us"
title = "The .NET Blog"
theme = "dotnet-minimal"
paginate = 10
enableRobotsTXT = true
enableGitInfo = false
summaryLength = 70

[markup]
  [markup.highlight]
    style = "nord"
    lineNos = false
    noClasses = false
  [markup.goldmark.renderer]
    unsafe = true

[taxonomies]
  tag = "tags"

# ── Custom output formats for LLM discoverability ──
[outputFormats]
  [outputFormats.llmstxt]
    mediaType = "text/plain"
    baseName = "llms"
    isPlainText = true
    notAlternative = true
  [outputFormats.llmsfulltxt]
    mediaType = "text/plain"
    baseName = "llms-full"
    isPlainText = true
    notAlternative = true

[outputs]
  home = ["HTML", "RSS", "llmstxt", "llmsfulltxt"]

# ── Sitemap ──
[sitemap]
  changeFreq = "weekly"
  priority = 0.5
  filename = "sitemap.xml"

[params]
  description = "Articles, tutorials and insights from the .NET community."
  homeTitle = "The .NET Blog · .NET, Azure, AI, and Cloud-Native Tutorials"
  eyebrow = "The .NET Community Blog"
  hero_title = "Where <span class=\"accent\">.NET developers</span><br/><span class=\"typewriter-line\"><span id=\"typewriter\"></span><span class=\"typewriter-cursor\">|</span></span>"
  hero_desc = "Deep dives, tutorials and community stories — written by developers, for developers."

  # SEO & Social
  defaultImage = "/img/og-default.png"
  logo = "/img/og-default.png"
  twitter = "thedotnetblog"
  socialProfiles = [
    "https://github.com/thedotnetblog/blog",
    "https://x.com/thedotnetblog"
  ]

[menus]
  [[menus.main]]
    name = "posts"
    url = "/posts"
    weight = 1
  [[menus.main]]
    name = "events"
    url = "/events"
    weight = 2
  [[menus.main]]
    name = "authors"
    url = "/authors"
    weight = 3
  [[menus.main]]
    name = "tags"
    url = "/tags"
    weight = 4

  [[menus.footer]]
    name = "posts"
    url = "/posts"
    weight = 1
  [[menus.footer]]
    name = "events"
    url = "/events"
    weight = 2
  [[menus.footer]]
    name = "authors"
    url = "/authors"
    weight = 3
