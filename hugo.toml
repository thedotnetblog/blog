baseURL = "https://thedotnetblog.com"
title = "The .NET Blog"
theme = "dotnet-minimal"
defaultContentLanguage = "en"
defaultContentLanguageInSubdir = false
enableMissingTranslationPlaceholders = false
paginate = 10
enableRobotsTXT = true
enableGitInfo = true
summaryLength = 70
buildFuture = true

[languages]
  [languages.en]
    languageCode = "en-us"
    languageName = "English"
    weight = 1
  [languages.es]
    languageCode = "es"
    languageName = "Español"
    weight = 2
  [languages.ca]
    languageCode = "ca-es"
    languageName = "Català"
    weight = 2.5
  [languages.de]
    languageCode = "de"
    languageName = "Deutsch"
    weight = 3
  [languages.fr]
    languageCode = "fr"
    languageName = "Français"
    weight = 4
  [languages.pt]
    languageCode = "pt"
    languageName = "Português"
    weight = 5
  [languages.it]
    languageCode = "it"
    languageName = "Italiano"
    weight = 6
  [languages.ja]
    languageCode = "ja"
    languageName = "日本語"
    weight = 7
  [languages.zh]
    languageCode = "zh"
    languageName = "中文"
    weight = 8
  [languages.ko]
    languageCode = "ko"
    languageName = "한국어"
    weight = 9
  [languages.ru]
    languageCode = "ru"
    languageName = "Русский"
    weight = 10
  [languages.hi]
    languageCode = "hi"
    languageName = "हिन्दी"
    weight = 11
  [languages.pl]
    languageCode = "pl"
    languageName = "Polski"
    weight = 12
  [languages.tr]
    languageCode = "tr"
    languageName = "Türkçe"
    weight = 13
  [languages.ar]
    languageCode = "ar"
    languageName = "العربية"
    weight = 14
    [languages.ar.params]
      dir = "rtl"
  [languages.id]
    languageCode = "id"
    languageName = "Bahasa Indonesia"
    weight = 15
  [languages.nl]
    languageCode = "nl"
    languageName = "Nederlands"
    weight = 16

[markup]
  [markup.highlight]
    style = "nord"
    lineNos = false
    noClasses = false
  [markup.goldmark.renderer]
    unsafe = true

[taxonomies]
  tag = "tags"

# ── Custom output formats for LLM discoverability ──
[outputFormats]
  [outputFormats.llmstxt]
    mediaType = "text/plain"
    baseName = "llms"
    isPlainText = true
    notAlternative = true
  [outputFormats.llmsfulltxt]
    mediaType = "text/plain"
    baseName = "llms-full"
    isPlainText = true
    notAlternative = true

[outputs]
  home = ["HTML", "RSS", "llmstxt", "llmsfulltxt"]

# ── Sitemap ──
[sitemap]
  changeFreq = "weekly"
  priority = 0.5
  filename = "sitemap.xml"

[params]
  description = "Articles, tutorials and insights from the .NET community."
  homeTitle = "The .NET Blog · .NET, Azure, AI, and Cloud-Native Tutorials"
  eyebrow = "The .NET Community Blog"
  hero_title = "Where <span class=\"accent\">.NET developers</span><br/><span class=\"typewriter-line\"><span id=\"typewriter\"></span><span class=\"typewriter-cursor\">|</span></span>"
  hero_desc = "Deep dives, tutorials and community stories — written by developers, for developers."

  # SEO & Social — must be declared before any [params.*] subtables (TOML scoping rule)
  defaultImage = "/img/og-default.png"
  logo = "/img/og-default.png"
  twitter = "thedotnetblog"
  socialProfiles = [
    "https://github.com/thedotnetblog/blog",
    "https://x.com/thedotnetblog"
  ]

  # Analytics (Umami)
  [params.umami]
    enabled = true
    websiteId = "0834ea36-1ac0-457f-9953-04b28fe8df8f"
    src = "https://analytics.emilianomontesdeoca.com/script.js"

[menus]
  [[menus.main]]
    identifier = "posts"
    name = "posts"
    url = "/posts"
    weight = 1
  [[menus.main]]
    identifier = "events"
    name = "events"
    url = "/events"
    weight = 2
  [[menus.main]]
    identifier = "authors"
    name = "authors"
    url = "/authors"
    weight = 3
  [[menus.main]]
    identifier = "tags"
    name = "tags"
    url = "/tags"
    weight = 4
  [[menus.main]]
    identifier = "contribute"
    name = "contribute"
    url = "/contribute"
    weight = 5

  [[menus.footer]]
    identifier = "posts"
    name = "posts"
    url = "/posts"
    weight = 1
  [[menus.footer]]
    identifier = "events"
    name = "events"
    url = "/events"
    weight = 2
  [[menus.footer]]
    identifier = "authors"
    name = "authors"
    url = "/authors"
    weight = 3
