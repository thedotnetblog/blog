{{- if .Translations -}}
<div class="post-translations">
  <span class="post-translations-label">This post is also available in:</span>
  {{- $last := sub (len .Translations) 1 -}}
  {{- range $i, $t := .Translations -}}
  <a href="{{ $t.RelPermalink }}" class="translation-link">{{ $t.Language.LanguageName }}</a>
  {{- if lt $i $last }}, {{ end -}}
  {{- end -}}
</div>
{{- end -}}
