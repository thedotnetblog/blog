{{- if .Translations -}}
<div class="post-translations">
  <span class="post-translations-label">{{ i18n "translation_available" }}</span>
  {{- $last := sub (len .Translations) 1 -}}
  {{- range $i, $t := .Translations -}}
  <a href="{{ $t.RelPermalink }}" class="translation-link" data-umami-event="translation-switch" data-umami-event-lang="{{ $t.Language.Lang }}">{{ $t.Language.LanguageName }}</a>
  {{- if lt $i $last }}, {{ end -}}
  {{- end -}}
</div>
{{- end -}}
