<header class="site-header">
  <nav class="nav-inner">
    <a href="{{ "/" | relURL }}" class="site-logo">
      the<span class="logo-dot">.NET</span> blog
    </a>
    <button class="nav-burger" id="nav-burger" aria-label="Open menu" aria-expanded="false">
      <span></span>
      <span></span>
      <span></span>
    </button>
    <ul class="nav-links" id="nav-links">
      {{ range .Site.Menus.main }}
      <li>
        <a href="{{ .URL }}"{{ if $.IsMenuCurrent "main" . }} class="active"{{ end }}>{{ .Name }}</a>

      {{ end }}

          <svg class="icon-moon" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        </button>
      </li>
    </ul>
  </nav>
