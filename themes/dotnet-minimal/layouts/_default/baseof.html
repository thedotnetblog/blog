<!DOCTYPE html>
<html lang="{{ .Site.Language.Lang | default "en" }}">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ if .IsHome }}{{ with .Site.Params.homeTitle }}{{ . }}{{ else }}{{ .Site.Title }} · .NET, Azure, AI, and Cloud-Native Tutorials{{ end }}{{ else }}{{ .Title }} · {{ .Site.Title }}{{ end }}</title>
  <meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ with .Site.Params.description }}{{ . }}{{ end }}{{ end }}" />

  {{- partial "seo.html" . -}}

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet" />

  <!-- Theme CSS -->
  <link rel="stylesheet" href="{{ "css/style.css" | relURL }}" />

  <!-- Theme init (runs before paint to prevent flash) -->
  <script>
    (function() {
      var saved = localStorage.getItem('theme');
      var theme = saved || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
      document.documentElement.setAttribute('data-theme', theme);
    })();
  </script>

  <!-- Favicon -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>☁️</text></svg>" />

  {{- partial "schema.html" . -}}

  <!-- LLM discoverability -->
  <link rel="alternate" type="text/plain" href="{{ "llms.txt" | absURL }}" title="LLM-readable summary" />

  {{ hugo.Generator }}
</head>
<body class="site-wrapper">

  {{- partial "header.html" . -}}

  <main class="main-content">
    {{- block "main" . }}{{- end }}
  </main>

  {{- partial "footer.html" . -}}

  <script>
    document.getElementById('theme-toggle').addEventListener('click', function() {
      var current = document.documentElement.getAttribute('data-theme');
      var next = current === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', next);
      localStorage.setItem('theme', next);
    });

    (function() {
      var burger = document.getElementById('nav-burger');
      var navLinks = document.getElementById('nav-links');
      if (burger && navLinks) {
        burger.addEventListener('click', function() {
          var isOpen = navLinks.classList.toggle('open');
          burger.classList.toggle('open', isOpen);
          burger.setAttribute('aria-expanded', String(isOpen));
        });
      }
    })();
  </script>

</body>
</html>
