<!DOCTYPE html>
<html lang="{{ .Site.Language.Lang | default "en" }}"{{ with .Site.Params.dir }} dir="{{ . }}"{{ end }}>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ if .IsHome }}{{ with .Site.Params.homeTitle }}{{ . }}{{ else }}{{ .Site.Title }} · .NET, Azure, AI, and Cloud-Native Tutorials{{ end }}{{ else }}{{ .Title }} · {{ .Site.Title }}{{ end }}</title>
  <meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ with .Site.Params.description }}{{ . }}{{ end }}{{ end }}" />

  {{- partial "seo.html" . -}}

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet" />

  <!-- Theme CSS -->
  <link rel="stylesheet" href="{{ "css/style.css" | relURL }}" />

  <!-- Theme init (runs before paint to prevent flash) -->
  <script>
    (function() {
      var saved = localStorage.getItem('theme');
      var theme = saved || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
      document.documentElement.setAttribute('data-theme', theme);
    })();
  </script>

  <!-- Favicon -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>☁️</text></svg>" />

  {{- partial "schema.html" . -}}

  <!-- LLM discoverability -->
  <link rel="alternate" type="text/plain" href="{{ "llms.txt" | absURL }}" title="LLM-readable summary" />

  {{- partial "umami.html" . -}}

  {{ hugo.Generator }}
</head>
<body class="site-wrapper">

  {{- partial "header.html" . -}}

  <main class="main-content">
    {{- block "main" . }}{{- end }}
  </main>

  {{- partial "footer.html" . -}}

  {{ block "scripts" . }}{{ end }}

  <script>
    document.getElementById('theme-toggle').addEventListener('click', function() {
      var current = document.documentElement.getAttribute('data-theme');
      var next = current === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', next);
      localStorage.setItem('theme', next);
    });

    (function() {
      var burger = document.getElementById('nav-burger');
      var navLinks = document.getElementById('nav-links');
      if (burger && navLinks) {
        burger.addEventListener('click', function() {
          var isOpen = navLinks.classList.toggle('open');
          burger.classList.toggle('open', isOpen);
          burger.setAttribute('aria-expanded', String(isOpen));
        });
      }
    })();

    /* ── Language selector ────────────────── */
    (function() {
      var toggle = document.getElementById('lang-toggle');
      var dropdown = document.getElementById('lang-dropdown');
      if (!toggle || !dropdown) return;

      toggle.addEventListener('click', function(e) {
        e.stopPropagation();
        var open = dropdown.classList.toggle('open');
        toggle.setAttribute('aria-expanded', String(open));
      });

      document.addEventListener('click', function(e) {
        if (!toggle.contains(e.target) && !dropdown.contains(e.target)) {
          dropdown.classList.remove('open');
          toggle.setAttribute('aria-expanded', 'false');
        }
      });

      /* Save preferred language on click */
      dropdown.querySelectorAll('a[data-lang]').forEach(function(a) {
        a.addEventListener('click', function() {
          localStorage.setItem('preferred-lang', a.getAttribute('data-lang'));
        });
      });

      /* Auto-redirect to preferred language on first visit */
      var preferred = localStorage.getItem('preferred-lang');
      var currentLang = document.documentElement.lang || 'en';
      if (preferred && preferred !== currentLang && !sessionStorage.getItem('lang-redirected')) {
        var langLink = dropdown.querySelector('a[data-lang="' + preferred + '"]');
        if (langLink && langLink.href) {
          sessionStorage.setItem('lang-redirected', '1');
          window.location.href = langLink.href;
        }
      }
    })();
  </script>

</body>
</html>
